  <!-- Loader -->
  <div id="loader" class="loader"></div>
  <div id="loader-text" class="loader-text">Memuat Streaming...</div>

  <!-- Branding -->

  <!-- Iframe -->
  <iframe id="view" loading="lazy" allowfullscreen></iframe>

  <!-- JS -->
 <script>
function getQueryVariable(variable) {
  const query = window.location.search.substring(1);
  const vars = query.split("@");
  for (let i = 0; i < vars.length; i++) {
    const pair = vars[i].split("+");
    if (pair[0] === variable) {
      return pair[1];
    }
  }
  return null;
}

function base64Decode(str) {
  try {
    return decodeURIComponent(atob(str));
  } catch (e) {
    return null;
  }
}

function hideLoader() {
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('loader-text').classList.add('hidden');
}

document.addEventListener("DOMContentLoaded", function () {
  const encodedUrl = getQueryVariable("url");

  if (!encodedUrl) {
    hideLoader();
    return;
  }

  const url = base64Decode(encodedUrl);

  if (!url) {
    hideLoader();
    return;
  }

  const iframe = document.getElementById('view');

  // preload trick (biar cepat)
  const preload = document.createElement("link");
  preload.rel = "preconnect";
  preload.href = new URL(url).origin;
  document.head.appendChild(preload);

  iframe.src = url;

  iframe.addEventListener("load", hideLoader);
});
</script>
