  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0f172a;
    }
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 50% 20%, rgba(56,189,248,0.15), transparent 60%);
  pointer-events: none;
  z-index: 1;
}
iframe#view {
  opacity: 0;
  transform: scale(1.02);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

iframe#view.show {
  opacity: 1;
  transform: scale(1);
}

/* BACKGROUND OVERLAY */
.loader-wrap {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: opacity 0.6s ease, visibility 0.6s;
}

/* HIDE STATE */
.loader-wrap.hidden {
  opacity: 0;
  visibility: hidden;
}

/* SPINNER GLOW */
.loader {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: conic-gradient(#38bdf8, transparent, #38bdf8);
  animation: spin 1.2s linear infinite;
  position: relative;
}

.loader::before {
  content: "";
  position: absolute;
  inset: 6px;
  background: #020617;
  border-radius: 50%;
}

/* GLOW EFFECT */
.loader::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  box-shadow: 0 0 25px #38bdf8, 0 0 60px #38bdf8;
  opacity: 0.6;
}

/* TEXT */
.loader-text {
  margin-top: 20px;
  color: #38bdf8;
  font-size: 15px;
  letter-spacing: 1px;
  animation: fadeText 1.5s infinite alternate;
}

/* ANIMATIONS */
@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes fadeText {
  from { opacity: 0.4; }
  to { opacity: 1; }
}
    .hidden {
      display: none !important;
    }
    /* Branding pojok */
.branding {
  position: fixed;
  top: 12px;
  right: 8px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(8px);
  color: #facc15;
  font-size: 12px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 10px;
  box-shadow: 0 0 12px rgba(250, 204, 21, 0.4);
  animation: float 3s ease-in-out infinite;
}

/* floating effect */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

    img[src^="https://um.simpli.fi/"],
    img[src^="https://i.liadm.com/"] {
      display: none;
    }
  </style>

<body>

  <!-- Loader -->
<div id="loaderWrap" class="loader-wrap">
  <div class="loader"></div>
  <div class="loader-text">Memuat Streaming...</div>
</div>

  <!-- Branding -->
  <div class="branding">www.score808.my.id</div>

  <!-- Iframe -->
  <iframe id="view" loading="lazy" allowfullscreen></iframe>

  <!-- JS -->
  <script>
    function getQueryVariable(variable) {
      var query = window.location.search.substring(1);
      var vars = query.split("@");
      for (var i = 0; i < vars.length; i++) {
        var pair = vars[i].split("+");
        if (pair[0] == variable) {
          return pair[1];
        }
      }
      return false;
    }

    function base64Decode(str) {
      try {
        return decodeURIComponent(escape(atob(str)));
      } catch (e) {
        return null;
      }
    }

    function hideLoader() {
  const loader = document.getElementById('loaderWrap');
  const iframe = document.getElementById('view');

  iframe.classList.add('show');

  setTimeout(() => {
    loader.classList.add('hidden');
  }, 300);
}
    window.onload = function () {
      const encodedUrl = getQueryVariable("url");
      if (encodedUrl) {
        const url = base64Decode(encodedUrl);
        if (url) {
          const iframe = document.getElementById('view');
          iframe.src = url;
  iframe.onload = hideLoader;
        } else {
          alert("Gagal decode URL streaming.");
          hideLoader();
        }
      } else {
        alert("Parameter URL streaming tidak ditemukan.");
        hideLoader();
      }
    };
  </script>
