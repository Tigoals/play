  <style>
    :root{
 --primary:#ef4444;
 --bg:#020617;
 --glass:rgba(15,23,42,.85);
 --border:rgba(255,255,255,.08);
}

body{
 background:#000;
 color:#fff;
}

#tab-demo{
 background:var(--glass)!important;
 backdrop-filter:blur(20px);
 border-bottom:1px solid var(--border);
}

.live-dot{
 width:10px;
 height:10px;
 border-radius:50%;
 background:#ef4444;
 animation:pulse 1.5s infinite;
}

@keyframes pulse{
 0%{
   box-shadow:0 0 0 0 rgba(239,68,68,.7);
 }
 100%{
   box-shadow:0 0 0 15px rgba(239,68,68,0);
 }
}

.player-loader{
 position:fixed;
 inset:0;
 background:#000;
 z-index:99999;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 gap:20px;
}

.player-spinner{
 width:70px;
 height:70px;
 border:4px solid #1e293b;
 border-top-color:#ef4444;
 border-radius:50%;
 animation:spin .8s linear infinite;
}

@keyframes spin{
 to{
   transform:rotate(360deg);
 }
}

.fab-group{
 position:fixed;
 right:15px;
 bottom:100px;
 display:flex;
 flex-direction:column;
 gap:12px;
 z-index:9999;
}

.fab{
 width:55px;
 height:55px;
 border:none;
 border-radius:50%;
 background:#ef4444;
 color:#fff;
 cursor:pointer;
 font-size:22px;
 box-shadow:0 10px 30px rgba(239,68,68,.4);
}

.toast{
 position:fixed;
 left:50%;
 bottom:120px;
 transform:translateX(-50%);
 background:#111827;
 color:#fff;
 padding:12px 20px;
 border-radius:12px;
 opacity:0;
 transition:.4s;
 z-index:10000;
}

.toast.show{
 opacity:1;
}

  <script>
    function getQueryVariable(variable) {
      var query = window.location.search.substring(1);
      var vars = query.split("@");
      for (var i = 0; i < vars.length; i++) {
        var pair = vars[i].split("+");
        if (pair[0] == variable) {
          return pair[1];
        }
      }
      return false;
    }

    function base64Decode(str) {
      try {
        return decodeURIComponent(escape(atob(str)));
      } catch (e) {
        return null;
      }
    }

    window.onload = function () {
      var encodedUrl = getQueryVariable("url");
      if (encodedUrl) {
        var url = base64Decode(encodedUrl);
        if (url) {
          document.getElementById('view').src = url;
        } else {
          alert("Gagal decode URL streaming.");
        }
      } else {
        alert("Parameter URL streaming tidak ditemukan.");
      }
    };
  </script>

  <script>
const iframe=document.getElementById("view");

function showToast(msg){

const toast=document.getElementById("toast");

toast.textContent=msg;

toast.classList.add("show");

setTimeout(()=>{
 toast.classList.remove("show");
},2500);

}

iframe.onload=()=>{

const loader=document.getElementById("loader");

loader.style.opacity="0";

setTimeout(()=>{
 loader.remove();
},500);

showToast("Stream Connected");

};

document
.getElementById("fullscreenBtn")
.onclick=()=>{

if(iframe.requestFullscreen){

iframe.requestFullscreen();

showToast("Fullscreen Mode");

}

};

document
.getElementById("refreshBtn")
.onclick=()=>{

iframe.src=iframe.src;

showToast("Refreshing Stream");

};

document
.getElementById("shareBtn")
.onclick=()=>{

if(navigator.share){

navigator.share({
 title:document.title,
 url:location.href
});

}else{

navigator.clipboard.writeText(location.href);

showToast("Link Copied");

}

};

document.addEventListener(
"fullscreenchange",
()=>{

const bar=document.getElementById("tab-demo");

if(document.fullscreenElement){

bar.style.display="none";

}else{

bar.style.display="flex";

}

}
);
</script>
